<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Floppy ears (dark, behind face) -->
  <path d="M5 11 C 4 16 6 22 9 23 L 11 14 Z" fill="#3a3431" />
  <path d="M27 11 C 28 16 26 22 23 23 L 21 14 Z" fill="#3a3431" />
  <!-- Top hair tuft (silky topknot) -->
  <path d="M11 8 C 12 4 20 4 21 8 C 21 11 11 11 11 8 Z" fill="#3a3431" />
  <!-- Face (tan body) -->
  <ellipse cx="16" cy="18" rx="10" ry="9.5" fill="#c89372" />
  <!-- Snout / lighter muzzle area -->
  <ellipse cx="16" cy="21" rx="5" ry="4" fill="#e3b990" />
  <!-- Dark forehead fringe -->
  <path d="M9 12 C 11 10 13 10 16 11 C 19 10 21 10 23 12 C 21 14 19 13 16 12.5 C 13 13 11 14 9 12 Z" fill="#3a3431" />
  <!-- Eyes -->
  <circle cx="12" cy="17" r="1.5" fill="#1f1f1f" />
  <circle cx="20" cy="17" r="1.5" fill="#1f1f1f" />
  <!-- Eye shine -->
  <circle cx="12.4" cy="16.6" r="0.45" fill="#ffffff" />
  <circle cx="20.4" cy="16.6" r="0.45" fill="#ffffff" />
  <!-- Nose -->
  <ellipse cx="16" cy="20" rx="1.4" ry="1" fill="#1f1f1f" />
  <!-- Mouth -->
  <path d="M16 21.2 V 22.5" stroke="#1f1f1f" stroke-width="0.7" stroke-linecap="round" />
  <path d="M16 22.5 Q 14.5 23.7 13.4 22.8" stroke="#1f1f1f" stroke-width="0.7" stroke-linecap="round" fill="none" />
  <path d="M16 22.5 Q 17.5 23.7 18.6 22.8" stroke="#1f1f1f" stroke-width="0.7" stroke-linecap="round" fill="none" />
  <!-- Tiny pink tongue -->
  <ellipse cx="16" cy="23.6" rx="0.9" ry="0.5" fill="#ff8a8a" />
</svg>
